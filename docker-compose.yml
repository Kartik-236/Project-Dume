# Project DUME — Docker Compose (Phase 2)
#
# Usage:
#   docker compose up --build          Start app + postgres
#   docker compose down                Stop all services
#   docker compose logs -f app         Tail app logs
#
# Dashboard: http://localhost:8000
# API:       http://localhost:8000/api/status

services:
  postgres:
    image: postgres:16-alpine
    container_name: dume-postgres
    environment:
      POSTGRES_DB: dume
      POSTGRES_USER: dume
      POSTGRES_PASSWORD: dume
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dume"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: dume-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_BACKEND: postgres
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: dume
      PGUSER: dume
      PGPASSWORD: dume
    depends_on:
      postgres:
        condition: service_healthy

    # ── Uncomment below for host kernel / log visibility ─────────
    # NOTE: not enabled by default for safety
    # privileged: true
    # volumes:
    #   - /proc:/host/proc:ro
    #   - /sys:/host/sys:ro
    #   - /var/log:/host/log:ro

volumes:
  pgdata:
